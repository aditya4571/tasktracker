<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADITYA TRACKER | CLOUD SYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-body: #0b0f19;
            --bg-card: #151b2b;
            --bg-card-hover: #1a2235;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --header-h: 70px;
            --side-w: 240px;
            --side-c: 70px;
        }
        [data-theme="light"] {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-card-hover: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s; }

        /* Header */
        .header { flex: 0 0 var(--header-h); background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 100; }
        .brand { font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; min-width: 200px; }
        .toggle-btn { background: none; border: none; color: var(--text-main); font-size: 1.5rem; cursor: pointer; margin-right: 20px; }
        .sync-badge { font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; background: rgba(16, 185, 129, 0.2); color: #10b981; display: flex; align-items: center; gap: 5px; }
        .sync-badge.syncing { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

        /* Layout Wrapper */
        .wrapper { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: var(--side-w); background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: width 0.3s ease; overflow-y: auto; overflow-x: hidden; }
        body.collapsed .sidebar { width: var(--side-c); }
        .nav-item { width: 100%; padding: 15px 20px; border: none; background: transparent; color: var(--text-muted); display: flex; align-items: center; gap: 15px; cursor: pointer; font-weight: 600; text-align: left; transition: all 0.2s; white-space: nowrap; }
        .nav-item:hover { background: var(--bg-card-hover); color: var(--primary); }
        .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--primary); border-right: 3px solid var(--primary); }
        .nav-icon { font-size: 1.2rem; min-width: 24px; text-align: center; }
        .nav-label { transition: opacity 0.2s; }
        body.collapsed .nav-label { opacity: 0; }

        /* Main Content */
        .main { flex: 1; padding: 25px; overflow-y: auto; overflow-x: hidden; position: relative;}
        
        /* Loading Overlay */
        #loader { position: absolute; top:0; left:0; right:0; bottom:0; background: var(--bg-body); z-index: 50; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 15px;}
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .dashboard-grid { display: grid; grid-template-columns: 0.8fr 1.2fr 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 15px; }
        
        .chart-wrap { position: relative; height: 120px; display: flex; justify-content: center; align-items: center; }
        .chart-text { position: absolute; font-size: 1.4rem; font-weight: 800; color: var(--text-main); }
        .timer-val { font-size: 2.2rem; font-weight: 800; font-family: monospace; text-align: center; margin-bottom: 10px; color: var(--text-main); }

        /* Grid */
        .table-wrapper { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; overflow-x: auto; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { border: 1px solid var(--border); text-align: center; padding: 8px 4px; font-size: 11px; font-weight: 600; }
        th { color: var(--text-muted); }
        .label-col { width: 180px; text-align: left; padding-left: 15px; font-size: 12px; position: sticky; left: 0; background: var(--bg-card); z-index: 2; border-right: 2px solid var(--border); }
        #tr-totals td { background: rgba(99, 102, 241, 0.05); color: var(--primary); font-weight: 800; }

        /* Elements */
        .btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: background 0.2s; }
        .btn:hover { background: var(--primary-hover); }
        .input-dark { background: var(--bg-body); border: 1px solid var(--border); color: var(--text-main); padding: 8px 15px; border-radius: 8px; outline: none; width: 100%; font-size: 0.85rem; }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .task-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        @media (max-width: 1200px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } .label-col { width: 120px; } }
    </style>
</head>
<body>

<header class="header">
    <button class="toggle-btn" onclick="document.body.classList.toggle('collapsed')">☰</button>
    <div class="brand">ADITYA TRACKER</div>
    
    <div style="margin-left: auto; display: flex; gap: 15px; align-items: center;">
        <div id="syncStatus" class="sync-badge">☁️ Synced</div>
        <div id="progText" style="font-weight: 800; font-size: 0.85rem; color: var(--primary); background: rgba(99,102,241,0.1); padding: 5px 12px; border-radius: 20px;">0% MONTHLY GOAL</div>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button>
    </div>
</header>

<div class="wrapper">
    <aside class="sidebar" id="monthNav"></aside>

    <main class="main">
        <div id="loader">
            <div class="spinner"></div>
            <p style="font-weight: 600; color: var(--text-muted); margin-top: 10px;">Connecting to Google Cloud...</p>
        </div>

        <div id="appContent" style="display: none;">
            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-title">Today's Motivation</div>
                    <div class="chart-wrap">
                        <canvas id="dailyPie"></canvas>
                        <div class="chart-text" id="pieText">0%</div>
                    </div>
                </div>
                
                <div class="card" style="background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; border: none;">
                    <div class="card-title" style="color: rgba(255,255,255,0.8);">Today's Focus 🎯</div>
                    <div id="focusArea" style="overflow-y: auto; max-height: 120px; display: flex; flex-direction: column; gap: 8px;"></div>
                </div>
                
                <div class="card">
                    <div class="card-title" style="text-align: center;">Zen Focus</div>
                    <div class="timer-val" id="timer">25:00</div>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button class="btn" id="startBtn" onclick="toggleTimer()">START</button>
                        <button class="btn" onclick="resetTimer()" style="background: var(--bg-body); color: var(--text-main); border: 1px solid var(--border);">RESET</button>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">Quick Tasks</div>
                    <div style="display:flex; gap:8px; margin-bottom: 10px;">
                        <input type="text" id="todoIn" class="input-dark" placeholder="New task...">
                        <button class="btn" onclick="addTodo()">+</button>
                    </div>
                    <div id="todoArea" style="overflow-y: auto; max-height: 80px;"></div>
                </div>
            </div>

            <div class="table-wrapper">
                <div class="table-header">
                    <h2 id="monthTitle" style="font-size: 1.2rem; font-weight: 800;">January 2026</h2>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="habitIn" class="input-dark" placeholder="New habit..." style="width:200px">
                        <button class="btn" onclick="adminAction('add')">Add Habit</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr id="tr-days"></tr>
                        <tr id="tr-totals"></tr>
                    </thead>
                    <tbody id="tr-body"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    // ==========================================
    // 🔗 DATABASE CONNECTION 
    // ==========================================
    const DB_URL = "https://script.google.com/macros/s/AKfycbzgwMbZcSq4HiNM9x-_-9gBtFwqBkHJsQoerEDsyQtAckGFQ-VQ-gvDhLjytL60pI6a/exec"; 
    const PW = "Admin@123";

    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const daysInMonths = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
    
    // Core Data Object
    let db = {
        habits: ["Wake up at 5 AM", "10 Min walk", "Read 20m"],
        todos: [],
        checks: {} // Format: "month_day_habitIndex": true
    };
    
    let curMonth = new Date().getMonth();
    const todayNum = new Date().getDate();

    // --- 1. Cloud Sync Engine ---
    async function loadData() {
        try {
            const response = await fetch(DB_URL);
            const serverData = await response.json();
            
            // If server has valid data, replace default local data
            if(serverData && serverData.habits) {
                db = serverData;
            }
        } catch(e) {
            console.error("Error loading data from cloud. Using local defaults.", e);
        }
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('appContent').style.display = 'block';
        initUI();
    }

    async function pushData() {
        const badge = document.getElementById('syncStatus');
        badge.className = 'sync-badge syncing';
        badge.innerHTML = '↻ Syncing...';

        try {
            await fetch(DB_URL, {
                method: "POST",
                body: JSON.stringify(db),
                headers: {
                    // text/plain prevents strict CORS preflight checks in Google Apps Script
                    "Content-Type": "text/plain;charset=utf-8", 
                }
            });
            badge.className = 'sync-badge';
            badge.innerHTML = '☁️ Synced';
        } catch(e) {
            console.error(e);
            badge.innerHTML = '⚠️ Sync Failed';
        }
    }

    // --- 2. Initializing UI ---
    let dailyChart;
    function initUI() {
        initChart();
        buildNav();
        render();
        renderTodos();
    }

    function buildNav() {
        const nav = document.getElementById('monthNav');
        nav.innerHTML = months.map((m, i) => `
            <button class="nav-item ${i === curMonth ? 'active' : ''}" onclick="switchMonth(${i})">
                <span class="nav-icon">📅</span>
                <span class="nav-label">${m}</span>
            </button>
        `).join('');
    }

    function switchMonth(index) {
        curMonth = index;
        buildNav();
        render();
    }

    // --- 3. Grid & Logic ---
    function render() {
        const days = daysInMonths[curMonth];
        document.getElementById('monthTitle').innerText = `${months[curMonth]} 2026`;
        
        let hDays = `<th class="label-col">Habits</th>`;
        let hTotals = `<td class="label-col">Daily Score</td>`;
        for(let d=1; d<=days; d++) {
            hDays += `<th>${d}</th>`;
            hTotals += `<td id="score-${d}">0</td>`;
        }
        document.getElementById('tr-days').innerHTML = hDays;
        document.getElementById('tr-totals').innerHTML = hTotals;

        document.getElementById('tr-body').innerHTML = db.habits.map((h, hi) => `
            <tr>
                <td class="label-col">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span>${h}</span>
                        <span onclick="adminAction('del', ${hi})" style="cursor:pointer; color:var(--text-muted); font-size:10px;">✕</span>
                    </div>
                </td>
                ${Array.from({length:days}, (_,i) => {
                    const d = i+1;
                    const key = `${curMonth}_${d}_${hi}`;
                    const checked = db.checks[key] ? 'checked' : '';
                    return `<td><input type="checkbox" ${checked} onchange="saveCheck(${d}, ${hi}, this.checked)"></td>`;
                }).join('')}
            </tr>
        `).join('');

        renderFocus();
        calcScores();
    }

    function saveCheck(day, hi, isChecked) {
        const key = `${curMonth}_${day}_${hi}`;
        if(isChecked) {
            db.checks[key] = true;
        } else {
            delete db.checks[key]; // Keep database lightweight
        }
        
        calcScores();
        if(day === todayNum && curMonth === new Date().getMonth()) renderFocus();
        else render();
        
        // Push the new checkmark state to Google Sheets
        pushData(); 
    }

    function calcScores() {
        const days = daysInMonths[curMonth];
        let totalMonthScore = 0;
        let possibleScore = days * db.habits.length;

        for(let d=1; d<=days; d++) {
            let dailyScore = 0;
            db.habits.forEach((_, hi) => {
                if(db.checks[`${curMonth}_${d}_${hi}`]) dailyScore++;
            });
            document.getElementById(`score-${d}`).innerText = dailyScore;
            totalMonthScore += dailyScore;
        }

        const pct = possibleScore ? Math.round((totalMonthScore / possibleScore) * 100) : 0;
        document.getElementById('progText').innerText = `${pct}% MONTHLY GOAL`;
        updatePieChart();
    }

    function renderFocus() {
        const area = document.getElementById('focusArea');
        if(new Date().getMonth() !== curMonth) {
            area.innerHTML = `<span style="opacity:0.6; font-size:0.8rem;">Viewing non-active month.</span>`;
            return;
        }
        area.innerHTML = db.habits.map((h, hi) => {
            const isChecked = db.checks[`${curMonth}_${todayNum}_${hi}`];
            return `
            <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="saveCheck(${todayNum}, ${hi}, this.checked)">
                <span style="${isChecked ? 'text-decoration:line-through; opacity:0.6;' : ''}">${h}</span>
            </label>`;
        }).join('');
    }

    // --- 4. Chart & Pomodoro ---
    function initChart() {
        const ctx = document.getElementById('dailyPie').getContext('2d');
        dailyChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Done', 'Left'], datasets: [{ data: [0, 1], backgroundColor: ['#6366f1', 'rgba(148, 163, 184, 0.1)'], borderWidth: 0 }] },
            options: { cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, responsive: true, maintainAspectRatio: false }
        });
    }

    function updatePieChart() {
        const isCurrentMonth = (new Date().getMonth() === curMonth);
        let doneToday = 0;
        if(isCurrentMonth) {
            db.habits.forEach((_, hi) => { if(db.checks[`${curMonth}_${todayNum}_${hi}`]) doneToday++; });
        }
        const total = db.habits.length || 1;
        const left = total - doneToday;
        const pct = isCurrentMonth ? Math.round((doneToday / total) * 100) : 0;

        dailyChart.data.datasets[0].data = isCurrentMonth ? [doneToday, left] : [0, 1];
        document.getElementById('pieText').innerText = isCurrentMonth ? `${pct}%` : '-';
        dailyChart.update();
    }

    let tInt, timeLeft = 25*60, isRunning = false;
    function toggleTimer() {
        if(!isRunning) {
            isRunning = true; document.getElementById('startBtn').innerText = "PAUSE";
            tInt = setInterval(() => {
                timeLeft--; updateTimerDisplay();
                if(timeLeft <= 0) { clearInterval(tInt); isRunning = false; resetTimer(); alert("Pomodoro Complete! Take a break."); }
            }, 1000);
        } else { clearInterval(tInt); isRunning = false; document.getElementById('startBtn').innerText = "RESUME"; }
    }
    function resetTimer() { clearInterval(tInt); isRunning = false; timeLeft = 25*60; document.getElementById('startBtn').innerText = "START"; updateTimerDisplay(); }
    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // --- 5. To-Do & Admin ---
    function addTodo() {
        const input = document.getElementById('todoIn');
        if(input.value.trim()) {
            db.todos.push({ id: Date.now(), text: input.value });
            input.value = '';
            renderTodos();
            pushData();
        }
    }
    function delTodo(id) {
        db.todos = db.todos.filter(t => t.id !== id);
        renderTodos();
        pushData();
    }
    function renderTodos() {
        document.getElementById('todoArea').innerHTML = db.todos.map(t => `
            <div class="task-row">
                <span>${t.text}</span>
                <button onclick="delTodo(${t.id})" style="background:none; border:none; color:var(--text-muted); cursor:pointer;">✕</button>
            </div>
        `).join('');
    }

    function adminAction(type, i = null) {
        if(prompt("Admin Password Required:") !== PW) return alert("Access Denied");
        if(type === 'add') {
            const val = document.getElementById('habitIn').value.trim();
            if(val) db.habits.push(val);
            document.getElementById('habitIn').value = '';
        } else if(type === 'del') {
            db.habits.splice(i, 1);
        }
        render();
        pushData();
    }

    function toggleTheme() {
        const root = document.documentElement;
        const mode = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', mode);
        localStorage.setItem('ad_cloud_theme', mode);
    }
    if(localStorage.getItem('ad_cloud_theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');

    // Startup
    window.onload = loadData;
</script>
</body>
</html>
